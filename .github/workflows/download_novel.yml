name: Browser Debugging Session
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to debug"
        required: true
        default: "https://example.com"

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Locate and Run Debug Script
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
        run: |
          echo "--- DEBUG: Listing all files in the repo ---"
          find . -maxdepth 2 -not -path '*/.*'
          echo "--------------------------------------------"
          
          if [ -f "debug_browser.py" ]; then
            echo "Found debug_browser.py in root. Running..."
            python debug_browser.py
          else
            echo "Searching for debug_browser.py in subdirectories..."
            FILE_PATH=$(find . -name "debug_browser.py" | head -n 1)
            if [ -n "$FILE_PATH" ]; then
              echo "Found script at $FILE_PATH. Running..."
              python "$FILE_PATH"
            else
              echo "ERROR: debug_browser.py not found anywhere in the repo!"
              exit 1
            fi
          fi

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: browser-debug-results
          path: |
            debug_screenshots/
            debug_logs/
