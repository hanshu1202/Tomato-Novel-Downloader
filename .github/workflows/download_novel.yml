name: Download TomatoMTL Novel

on:
  workflow_dispatch:
    inputs:
      novel_url:
        description: "Paste your TomatoMTL novel URL here"
        required: true
        type: string
      start_chapter:
        description: "Start from chapter number (e.g. 1)"
        required: false
        default: "1"
        type: string
      end_chapter:
        description: "End at chapter number (e.g. 50) — leave empty for ALL chapters"
        required: false
        default: ""
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4

      - name: Download novel chapters
        env:
          TOMATO_EMAIL: ${{ secrets.TOMATO_EMAIL }}
          TOMATO_PASSWORD: ${{ secrets.TOMATO_PASSWORD }}
        run: |
          START="${{ github.event.inputs.start_chapter }}"
          END="${{ github.event.inputs.end_chapter }}"

          if [ -z "$END" ]; then
            python tomatomtl_downloader.py "${{ github.event.inputs.novel_url }}" "$START"
          else
            python tomatomtl_downloader.py "${{ github.event.inputs.novel_url }}" "$START" "$END"
          fi

      - name: Upload novel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-novel
          path: downloaded_novels/
          retention-days: 7
