name: Download TomatoMTL Novel

on:
  workflow_dispatch:
    inputs:
      novel_url:
        description: "Paste your TomatoMTL novel URL here"
        required: true
        type: string
      start_chapter:
        description: "Start from chapter number (e.g. 1)"
        required: false
        default: "1"
        type: string
      end_chapter:
        description: "End at chapter number (e.g. 50) — leave empty for ALL"
        required: false
        default: ""
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Download novel chapters
        env:
          TOMATO_COOKIES: ${{ secrets.TOMATO_COOKIES }}
        run: |
          START="${{ github.event.inputs.start_chapter }}"
          END="${{ github.event.inputs.end_chapter }}"
          if [ -z "$END" ]; then
            python tomatomtl_downloader.py "${{ github.event.inputs.novel_url }}" "$START"
          else
            python tomatomtl_downloader.py "${{ github.event.inputs.novel_url }}" "$START" "$END"
          fi

      - name: Upload novel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-novel
          path: downloaded_novels/
          retention-days: 7

      - name: Upload recordings as artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-recordings
          path: recordings/
          retention-days: 7
